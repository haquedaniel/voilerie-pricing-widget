<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demande de disponibilité</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="widget">
    <h2>Vérifier les disponibilités</h2>

    <label>
      Appartement
      <select id="propertyId">
        <option value="2" data-portfolio="voilerie">Un Jardin sur la Mer</option>
        <option value="4" data-portfolio="voilerie">Un Balcon sur la Mer</option>
        <option value="5" data-portfolio="voilerie">Le refuge sous les Toits</option>
        <option value="peskerezh" data-portfolio="peskerezh">La Peskerezh</option>
      </select>
    </label>

    <label>
      Arrivée
      <input id="checkIn" type="date" />
    </label>

    <label>
      Départ
      <input id="checkOut" type="date" />
    </label>

    <label>
      Voyageurs
      <input id="guests" type="number" min="1" value="2" />
    </label>

    <button id="quoteBtn">Voir le prix</button>

    <div id="result" class="result"></div>


      <div id="leadForm" class="lead-form hidden">
  <h3>Demande de réservation</h3>

  <label>
    Nom
    <input id="leadName" type="text" />
  </label>

  <label>
    Email
    <input id="leadEmail" type="email" />
  </label>

  <label>
    Téléphone (optionnel)
    <input id="leadPhone" type="text" />
  </label>

  <label>
    Message
    <textarea id="leadMessage"></textarea>
  </label>

  <label class="checkbox">
    <input id="gdprConsent" type="checkbox" />
    <span>
      J’accepte que mes données soient utilisées pour traiter ma demande de réservation.
    </span>
  </label>

  <p class="gdpr-text">
    Vos données sont utilisées uniquement dans le cadre de votre demande de réservation et ne seront jamais revendues à des tiers.
  </p>

  <button id="leadBtn">
    Envoyer la demande
  </button>

  <div id="leadResult"></div>
</div>


  </main>




  <script src="widget.js"></script>
</body>
</html>
